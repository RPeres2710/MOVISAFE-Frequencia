    <script>
        // Status básico (fallback). Importante: não sobrescreve o status do Supabase
        // quando `js/supabase-sync.js` estiver ativo.
        (function () {
            function hasSupabaseSync() {
                return typeof window.updateCloudStatus === 'function' || typeof window.supabaseLogin === 'function';
            }

            function setCloudStatusBasic() {
                if (hasSupabaseSync()) return;

                const el = document.getElementById('cloudStatus');
                if (!el) return;

                if (navigator.onLine) {
                    el.textContent = 'ONLINE';
                    el.classList.add('status-online');
                    el.classList.remove('status-offline');
                } else {
                    el.textContent = 'OFFLINE';
                    el.classList.add('status-offline');
                    el.classList.remove('status-online');
                }
            }

            document.addEventListener('DOMContentLoaded', setCloudStatusBasic);
            window.addEventListener('online', setCloudStatusBasic);
            window.addEventListener('offline', setCloudStatusBasic);
        })();

        // LISTA ATUALIZADA DE OPERADORES - Carol Mury removida, Lorhane Ribeiro e Wellington Fraga adicionados
        const operators = ['Josniel Rodriguez', 'Leticia Pinheiro', 'Heitor Cunha', 'Lais Ril', 'Lorhane Ribeiro', 'Luis Butter', 'Wellington Fraga'];
        
        // CONFIGURAÇÃO DE SALÁRIOS

            'Leticia Pinheiro': 1836.50,
            'Heitor Cunha': 2096.00,
            'Lais Ril': 1836.50,
            'Lorhane Ribeiro': 1836.50,
            'Luis Butter': 2453.89,
            'Wellington Fraga': 1836.50
        };
        
        // Estrutura: scheduleData[month][operator][day]
        let allScheduleData = {};
        let overtimeData = {};
        let lockedMonths = {};
        let currentCellId = null;

        const LOCK_PASSWORD = '051019';

        function getSelectedMonthKey() {
            return document.getElementById('monthSelect').value;
        }

        function isMonthLocked(monthKey) {
            const key = monthKey || getSelectedMonthKey();
            return !!lockedMonths[key];
        }

        function updateLockUI() {
            const locked = isMonthLocked();
            const btn = document.getElementById('lockMonthBtn');
            if (btn) {
                btn.textContent = locked ? '🔓 Desbloquear Mês' : '🔒 Bloquear Mês';
                btn.classList.toggle('locked', locked);
            }
            document.querySelectorAll('.hours-input').forEach((el) => {
                el.disabled = locked;
            });
        }

        function toggleMonthLock() {
            const monthKey = getSelectedMonthKey();
            const locked = isMonthLocked(monthKey);

            if (locked) {
                const pass = (prompt('Senha para desbloquear o mês:') || '').trim();
                if (pass !== LOCK_PASSWORD) {
                    alert('❌ Senha incorreta.');
                    return;
